<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NordFlix - Login</title>
  <link rel="stylesheet" href="./css/loginPlataforma.css"/>
</head>
<body>

  <div class="background"></div>

  <div class="logo"><img src="./logoPreta.png" alt="logo NordFlix"/></div>

  <div class="login-container">

    <h1>Entrar</h1>

    <div class="input-box">
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
      <input type="password" id="senha" placeholder="Senha">
    </div>

    <a href="./usuario.html"><button class="login-btn">
      Entrar
    </button></a>

    <div class="extras">
      <a href="#">Esqueceu a senha?</a>
      <a href="#">Ajuda</a>
    </div>

    <div class="signup">
      Novo por aqui?
      <a href="./cadastro.html">Assine agora</a>
    </div>

  </div>

</body>
</html>
