<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback do Projeto</title>
    <link rel="stylesheet" href="../css/styleForm.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/icons/logo.ico">
</head>
<body>

    <div class="feedback-card">
        <header class="feedback-header">
            <h1>Sua opinião é fundamental 🚀</h1>
            <p>Ajude-nos a moldar as futuras atualizações do nosso sistema.</p>
        </header>

        <form id="feedbackForm">
            <div class="form-group">
                <label>Como você avalia sua experiência geral?</label>
                <div class="rating-group">
                    <input type="radio" name="rating" value="1" id="star1"><label for="star1">1</label>
                    <input type="radio" name="rating" value="2" id="star2"><label for="star2">2</label>
                    <input type="radio" name="rating" value="3" id="star3"><label for="star3">3</label>
                    <input type="radio" name="rating" value="4" id="star4"><label for="star4">4</label>
                    <input type="radio" name="rating" value="5" id="star5"><label for="star5">5</label>
                </div>
            </div>

            <div class="form-group">
                <label "category">Qual área precisa de mais atenção?</label>
                <select id="category" name="category">
                    <option value="ui-ux">Interface e Design (UI/UX)</option>
                    <option value="performance">Velocidade e Performance</option>
                    <option value="features">Novas Funcionalidades</option>
                    <option value="bugs">Correção de Erros</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">O que você gostaria de ver na próxima versão?</label>
                <textarea id="message" name="message" rows="4" placeholder="Escreva aqui sua sugestão..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Feedback</button>
        </form>
    </div>

    <div class="mural-container">
        <h2>Feedbacks da Comunidade 💬</h2>
        <div id="muralList"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../js/scriptForm.js"></script>
   
</body>
</html>
