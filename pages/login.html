<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NordFlix - Login</title>
  <link rel="stylesheet" href="../css/loginPlataforma.css"/>
  <link rel="icon" type="image/png" href="../assets/icons/logo.ico">
</head>
<body>

  <div class="background"></div>

  <div class="logo"><img src="../assets/icons/logoPreta.png" alt="logo NordFlix"/></div>

  <div class="login-container">

    <h1>Entrar</h1>

    <div class="input-box">
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
      <input type="password" id="senha" placeholder="Senha">
    </div>

    <button onclick="login()" class="login-btn">
      Entrar
    </button>
    <span id="erroLogin" class="erro-msg"></span>

    <div class="extras">
      <a href="#">Esqueceu a senha?</a>
      <a href="#">Ajuda</a>
    </div>

    <div class="signup">
      Novo por aqui?
      <a href="./cadastro.html">Assine agora</a>
    </div>

  </div>
  <script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl =
'https://reblemspxlrjmjfbyhel.supabase.co'

const supabaseKey =
'sb_publishable_BxSMan9yVUGf2nCb5b-4HA_iW7Qx0YP'

const supabase = createClient(
  supabaseUrl,
  supabaseKey
)

window.login = async function () {

  const erroLogin =
    document.getElementById('erroLogin')

  erroLogin.textContent = ''

  const email =
    document.getElementById('email').value

  const senha =
    document.getElementById('senha').value

  if (!email || !senha) {

    erroLogin.textContent =
      'Preencha todos os campos'

    return
  }

  const { data, error } = await supabase
    .from('usuarios')
    .select('*')
    .eq('email', email)
    .eq('senha', senha)
    .single()

  if (error) {

    console.log(error)

    erroLogin.textContent =
      'Email ou senha inválidos'

    return
  }

  if (!data) {

    erroLogin.textContent =
      'Email ou senha inválidos'

    return
  }

  window.location.href = './usuario.html'
}

</script>

</body>
</html>
